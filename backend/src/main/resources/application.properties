server.port=${PORT:${SERVER_PORT:8080}}
spring.datasource.url=${SPRING_DATASOURCE_URL:${DB_URL:jdbc:mysql://localhost:3306/quickmeds?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:root}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
app.jwt.secret=${JWT_SECRET:change-this-secret-key-to-at-least-32-characters-long}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.upload-dir=${UPLOAD_DIR:uploads}
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
springdoc.swagger-ui.path=/swagger-ui.html

# Mail configuration (Gmail SMTP + App Password)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:suryanshura173@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.debug=${MAIL_DEBUG:false}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.mail.from=${APP_MAIL_FROM:suryanshura173@gmail.com}
app.mail.fallback-to=${APP_MAIL_FALLBACK_TO:suryanshura173@gmail.com}
app.email.test-enabled=${APP_EMAIL_TEST_ENABLED:false}

logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.org.springframework=${LOG_LEVEL_SPRING:INFO}
